  <script>
    const REST_DEFAULTS = {
      httpsPort: 27124,
      httpPort: 27123
    };

    const LOCAL_HOST_PATTERN = /^https?:\/\/(127\.0\.0\.1|localhost)/;

    const $ = (selector) => document.querySelector(selector);

    function stripTrailingSlash(url = '') {
      return url.replace(/\/+$/, '');
    }

    function normalizePath(value) {
      return value.replace(/^[\\/]+/, '').replace(/[\\/]+/g, '/');
    }

    function normalizeVaultSegment(value) {
      const trimmed = value?.trim();
      if (!trimmed) return undefined;
      const stripped = trimmed.replace(/^[/]+|[/]+$/g, '');
      if (!stripped) return undefined;
      return encodeURIComponent(stripped);
    }

    function joinUrl(base, segment) {
      const normalizedBase = stripTrailingSlash(base);
      const normalizedSegment = segment.replace(/^[/]+/, '');
      if (!normalizedSegment) {
        return normalizedBase || base;
      }
      return `${normalizedBase}/${normalizedSegment}`;
    }

    function hasVaultSegment(url, vaultSegment) {
      if (!vaultSegment) return false;
      const normalized = stripTrailingSlash(url);
      if (!normalized) return false;
      const suffix = `/vault/${vaultSegment}`.toLowerCase();
      const [pathOnly] = normalized.split(/[?#]/, 1);
      try {
        const parsed = new URL(
          pathOnly,
          pathOnly.startsWith('http') ? undefined : 'http://placeholder'
        );
        const pathname = stripTrailingSlash(parsed.pathname).toLowerCase();
        return pathname.endsWith(suffix);
      } catch {
        return stripTrailingSlash(pathOnly).toLowerCase().endsWith(suffix);
      }
    }

    function buildVaultUrl(baseUrl, vault, encodedPath) {
      const normalizedBase = stripTrailingSlash(baseUrl.trim());
      const vaultSegment = normalizeVaultSegment(vault);
      if (!vaultSegment) {
        return joinUrl(joinUrl(normalizedBase, 'vault'), encodedPath);
      }
      if (hasVaultSegment(normalizedBase, vaultSegment)) {
        return joinUrl(normalizedBase, encodedPath);
      }
      if (normalizedBase.toLowerCase().endsWith('/vault')) {
        return joinUrl(joinUrl(normalizedBase, vaultSegment), encodedPath);
      }
      return joinUrl(joinUrl(joinUrl(normalizedBase, 'vault'), vaultSegment), encodedPath);
    }

    function coerceUrl(value, fallback) {
      const trimmed = value?.trim();
      if (trimmed) return trimmed;
      return fallback;
    }

    function addUnique(list, url, protocol) {
      if (!url) return;
      if (list.some(item => item.url === url)) return;
      list.push({ url, protocol });
    }

    function createRestCandidates(config, encodedPath, directPath) {
      const urlsToTry = [];
      const resolvedHttpsUrl = coerceUrl(config.httpsUrl, config.baseUrl);
      const resolvedHttpUrl = coerceUrl(config.httpUrl, config.baseUrl?.replace(/^https:/, 'http:'));
      const resolvedBaseUrl = coerceUrl(config.baseUrl, resolvedHttpsUrl || resolvedHttpUrl || '');

      const resolvedConfig = {
        baseUrl: resolvedBaseUrl,
        httpsUrl: resolvedHttpsUrl,
        httpUrl: resolvedHttpUrl,
        vault: config.vault
      };

      const vaultSegment = normalizeVaultSegment(resolvedConfig.vault);

      const pushCandidate = (targetUrl, protocol) => {
        if (!targetUrl) return;
        const trimmed = targetUrl.trim();
        if (!trimmed) return;
        const normalizedBase = stripTrailingSlash(trimmed);
        const effectivePath = directPath ?? encodedPath;
        const directUrl = joinUrl(normalizedBase, effectivePath);
        addUnique(urlsToTry, directUrl, protocol);
        if (!hasVaultSegment(normalizedBase, vaultSegment)) {
          const fallbackUrl = buildVaultUrl(trimmed, resolvedConfig.vault, encodedPath);
          addUnique(urlsToTry, fallbackUrl, `${protocol} (vault)`);
        }
      };

      const hasExplicit = Boolean(config.httpsUrl?.trim() || config.httpUrl?.trim());
      if (hasExplicit) {
        pushCandidate(resolvedConfig.httpsUrl, 'HTTPS (用户配置)');
        pushCandidate(resolvedConfig.httpUrl, 'HTTP (用户配置)');
        if (resolvedConfig.httpsUrl && resolvedConfig.httpUrl && LOCAL_HOST_PATTERN.test(resolvedConfig.httpsUrl)) {
          const httpAltPort = resolvedConfig.httpUrl.replace(`:${REST_DEFAULTS.httpPort}`, `:${REST_DEFAULTS.httpsPort}`);
          if (httpAltPort !== resolvedConfig.httpUrl) {
            pushCandidate(httpAltPort, 'HTTP (备用端口)');
          }
        }
        return urlsToTry;
      }

      if (!LOCAL_HOST_PATTERN.test(resolvedConfig.baseUrl)) {
        pushCandidate(resolvedConfig.baseUrl, resolvedConfig.baseUrl.startsWith('https://') ? 'HTTPS' : 'HTTP');
        return urlsToTry;
      }

      if (resolvedConfig.baseUrl.startsWith('https://')) {
        pushCandidate(resolvedConfig.baseUrl, 'HTTPS');
        pushCandidate(resolvedConfig.baseUrl.replace(/^https:/, 'http:'), 'HTTP (same port)');
        const httpAltPort = resolvedConfig.baseUrl
          .replace(/^https:/, 'http:')
          .replace(`:${REST_DEFAULTS.httpsPort}`, `:${REST_DEFAULTS.httpPort}`);
        if (httpAltPort !== resolvedConfig.baseUrl.replace(/^https:/, 'http:')) {
          pushCandidate(httpAltPort, `HTTP (port ${REST_DEFAULTS.httpPort})`);
        }
        return urlsToTry;
      }

      pushCandidate(resolvedConfig.baseUrl, 'HTTP');
      pushCandidate(resolvedConfig.baseUrl.replace(/^http:/, 'https:'), 'HTTPS (same port)');
      const httpsAltPort = resolvedConfig.baseUrl
        .replace(/^http:/, 'https:')
        .replace(`:${REST_DEFAULTS.httpPort}`, `:${REST_DEFAULTS.httpsPort}`);
      if (httpsAltPort !== resolvedConfig.baseUrl.replace(/^http:/, 'https:')) {
        pushCandidate(httpsAltPort, `HTTPS (port ${REST_DEFAULTS.httpsPort})`);
      }
      return urlsToTry;
    }

    async function runTests() {
      const httpsUrl = $('#httpsUrl').value;
      const httpUrl = $('#httpUrl').value;
      const baseUrl = $('#baseUrl').value;
      const vault = $('#vault').value;
      const apiKey = $('#apiKey').value.trim();
      const method = $('#method').value;
      const relativePath = normalizePath($('#relativePath').value.trim());
      const output = $('#output');
      output.value = '';

      if (!vault) {
        output.value = '⚠️ 请填写 Vault ID（与 Local REST 插件中保持一致）。\n';
        return;
      }

      if (!baseUrl && !httpsUrl && !httpUrl) {
        output.value = '⚠️ 请至少填写一个基础地址（Base / HTTPS / HTTP）。\n';
        return;
      }

      const encodedPath = encodeURI(relativePath);
      const directPath = relativePath ? relativePath.split('/').map(encodeURIComponent).join('/') : '';
      const candidates = createRestCandidates({ httpsUrl, httpUrl, baseUrl, vault }, encodedPath);

      if (candidates.length === 0) {
        output.value = '⚠️ 未生成任何候选 URL，请检查输入。\n';
        return;
      }

      output.value += `共生成 ${candidates.length} 个候选，将依次尝试 ${method} 请求：\n\n`;

      for (const candidate of candidates) {
        output.value += `▶️ ${candidate.protocol}: ${candidate.url}\n`;
        try {
          const res = await fetch(candidate.url, {
            method,
            headers: {
              ...(apiKey ? { Authorization: `Bearer ${apiKey}` } : {})
            }
          });
          const snippet = await res.text().catch(() => res.statusText || '');
          if (res.ok) {
            output.value += `✅ 成功：HTTP ${res.status} ${res.statusText}\n\n`;
            return;
          }
          output.value += `⚠️ 响应错误：HTTP ${res.status} - ${snippet.slice(0, 160)}\n\n`;
        } catch (error) {
          output.value += `❌ 网络错误：${error instanceof Error ? error.message : String(error)}\n\n`;
        }
      }
      output.value += '所有候选都失败，请根据上述信息排查。\n';
    }

    const API_SCENARIOS = [

        path: '/active/',
        requiresAuth: true,
        contentType: 'text/markdown',
        body: '\n\n## 追加片段\n' + new Date().toISOString(),

      },

    const scenarioSelect = $('#apiScenario');

    }

    function updateScenarioFields() {
      const scenario = API_SCENARIOS.find(item => item.key === scenarioSelect.value);
      if (!scenario) {
        $('#apiDescription').textContent = '';
        return;
      }
      $('#apiMethod').value = scenario.method;
      $('#apiPath').value = scenario.path;
      $('#apiQuery').value = scenario.query ?? '';
      $('#apiContentType').value = scenario.contentType ?? '';
      $('#apiBody').value = scenario.body ?? '';
      $('#extraHeaders').value = scenario.headers ? JSON.stringify(scenario.headers, null, 2) : '';
      $('#apiDescription').textContent = scenario.description;
      $('#authHint').textContent = scenario.requiresAuth
        ? '该接口需要 Bearer Token（即上方 API Key）。'
        : '该接口默认不校验 API Key，可选填或留空。';
      if (scenario.accept) {
        $('#apiAccept').value = scenario.accept;
      } else {
        $('#apiAccept').value = '';
      }
    }

    scenarioSelect.addEventListener('change', updateScenarioFields);
    updateScenarioFields();

    function resolveScenarioPath(rawPath) {
      const vault = $('#vault').value.trim();
      const userPath = normalizePath($('#relativePath').value.trim());
      let result = rawPath || '/';
      if (vault) {
        result = result.replace(':vault', normalizeVaultSegment(vault) ?? '');
      }
      if (userPath) {
        result = result.replace(':path', userPath);
      }
      return result;
    }

    function buildUrlWithPath(base, path) {
      if (!path || path === '/') {
        return stripTrailingSlash(base) || base;
      }
      return joinUrl(base, path.replace(/^[/]+/, ''));
    }

    async function runApiScenario() {
      const scenario = API_SCENARIOS.find(item => item.key === scenarioSelect.value);
      const base = $('#baseUrl').value.trim() || $('#httpsUrl').value.trim() || $('#httpUrl').value.trim();
      if (!base) {
        $('#apiOutput').value = '⚠️ 请先填写 Base/HTTPS/HTTP URL。';
        return;
      }
      const path = resolveScenarioPath($('#apiPath').value.trim());
      const url = buildUrlWithPath(base, path);
      const query = $('#apiQuery').value.trim();
      const finalUrl = query ? `${url}?${query.replace(/^\?/, '')}` : url;
      const method = $('#apiMethod').value.trim().toUpperCase() || 'GET';
      const headers = {};
      const contentType = $('#apiContentType').value.trim();
      const accept = $('#apiAccept').value.trim();
      const apiKey = $('#apiKey').value.trim();
      const requiresAuth = scenario ? scenario.requiresAuth !== false : true;

      if (requiresAuth && apiKey) {
        headers.Authorization = `Bearer ${apiKey}`;
      }
      if (!requiresAuth && apiKey) {
        headers.Authorization = `Bearer ${apiKey}`;
      }
      if (contentType) {
        headers['Content-Type'] = contentType;
      }
      if (accept) {
        headers.Accept = accept;
      }

      const extraHeadersRaw = $('#extraHeaders').value.trim();
      if (extraHeadersRaw) {
        try {
          Object.assign(headers, JSON.parse(extraHeadersRaw));
        } catch (error) {
          $('#apiOutput').value = `⚠️ 额外 Headers 不是有效 JSON：${error instanceof Error ? error.message : error}`;
          return;
        }
      }

      const body = $('#apiBody').value;
      const init = { method, headers };
      if (!['GET', 'HEAD'].includes(method) && body) {
        init.body = body;
      }

      $('#apiOutput').value = `➡️ ${method} ${finalUrl}\nHeaders: ${JSON.stringify(headers, null, 2)}\n\n执行中...\n`;
      try {
        const response = await fetch(finalUrl, init);
        const text = await response.text();
        $('#apiOutput').value = `⬅️ 状态：${response.status} ${response.statusText}\n${text}`;
      } catch (error) {
        $('#apiOutput').value = `❌ 请求失败：${error instanceof Error ? error.message : String(error)}`;
      }
    }

    $('#runApiBtn').addEventListener('click', (event) => {
      event.preventDefault();
      $('#runApiBtn').disabled = true;
      runApiScenario().finally(() => {
        $('#runApiBtn').disabled = false;
      });
    });
  </script>
</body>
</html>
