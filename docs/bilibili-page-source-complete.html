                            .comment-item, .reply-item { display: flex; gap: 12px; margin-bottom: 12px; }
                            .comment-avatar, .reply-avatar { flex-shrink: 0; }
                            .avatar-img { width: 40px; height: 40px; border-radius: 50%; }
                            .comment-content, .reply-content { flex: 1; min-width: 0; }
                            .comment-user-info, .reply-user-info { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
                            .comment-user-name, .reply-user-name { font-weight: 500; color: #61666d; font-size: 13px; }
                            .comment-user-level { background: #fb7299; color: #fff; font-size: 10px; padding: 1px 4px; border-radius: 2px; }
                            .rich-text-content { font-size: 14px; line-height: 1.6; color: #18191c; margin-bottom: 8px; word-wrap: break-word; }
                            .reply-target { color: #00aeec; margin-right: 4px; }
                            .comment-actions, .reply-actions { display: flex; align-items: center; gap: 16px; font-size: 12px; color: #9499a0; }
                            .comment-time, .reply-time { color: #9499a0; }
                            .comment-like, .reply-like { cursor: pointer; display: flex; align-items: center; gap: 4px; }
                            .comment-reply { cursor: pointer; color: #9499a0; }
                            .comment-replies { margin-left: 52px; margin-top: 12px; background: #f8f9fa; border-radius: 8px; padding: 12px; }
                            .emoji-img { width: 20px; height: 20px; vertical-align: middle; }
                        </style>
                        <div class="comment-thread">
                            <slot></slot>
                        </div>
                    `;
                }
            }

            class BiliCommentRenderer extends HTMLElement {
                constructor() {
                    super();
                    this.attachShadow({ mode: 'open' });
                }

                connectedCallback() {
                    // 实际会渲染单条评论的完整结构
                    const commentId = this.getAttribute('data-comment-id') || 'unknown';
                    this.shadowRoot.innerHTML = `
                        <style>
                            .comment-item { display: flex; gap: 12px; margin-bottom: 12px; }
                            .comment-avatar { flex-shrink: 0; }
                            .avatar-img { width: 40px; height: 40px; border-radius: 50%; }
                            .comment-content { flex: 1; min-width: 0; }
                            .comment-user-info { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
                            .comment-user-name { font-weight: 500; color: #61666d; font-size: 13px; }
                            .comment-user-level { background: #fb7299; color: #fff; font-size: 10px; padding: 1px 4px; border-radius: 2px; }
                            .rich-text-content { font-size: 14px; line-height: 1.6; color: #18191c; margin-bottom: 8px; word-wrap: break-word; }
                            .comment-actions { display: flex; align-items: center; gap: 16px; font-size: 12px; color: #9499a0; }
                            .comment-time { color: #9499a0; }
                            .comment-like { cursor: pointer; display: flex; align-items: center; gap: 4px; }
                            .comment-reply { cursor: pointer; color: #9499a0; }
                        </style>
                        <div class="comment-item" data-comment-id="${commentId}">
                            <div class="comment-avatar">
                                <bili-avatar data-mid="12345">
                                    <img src="//i0.hdslb.com/bfs/face/member/noface.jpg" class="avatar-img" alt="用户头像">
                                </bili-avatar>
                            </div>
                            <div class="comment-content">
                                <div class="comment-user-info">
                                    <span class="comment-user-name">示例用户</span>
                                    <span class="comment-user-level">LV6</span>
                                </div>
                                <bili-rich-text>
                                    <div class="rich-text-content">
                                        <span class="text-node">这是一条示例评论内容</span>
                                    </div>
                                </bili-rich-text>
                                <div class="comment-actions">
                                    <span class="comment-time">2024-10-18 12:30</span>
                                    <span class="comment-like">👍 89</span>
                                    <span class="comment-reply">回复</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            class BiliRichText extends HTMLElement {
                constructor() {
                    super();
                    this.attachShadow({ mode: 'open' });
                }

                connectedCallback() {
                    // 实际会渲染富文本内容
                    const content = this.getAttribute('data-content') || this.textContent || '富文本内容';
                    this.shadowRoot.innerHTML = `
                        <style>
                            .rich-text-content { font-size: 14px; line-height: 1.6; color: #18191c; word-wrap: break-word; }
                            .text-node { /* 普通文本节点 */ }
                            .reply-target { color: #00aeec; margin-right: 4px; }
                            .emoji-img { width: 20px; height: 20px; vertical-align: middle; }
                        </style>
                        <div class="rich-text-content">
                            <span class="text-node">${content}</span>
                        </div>
                    `;
                }
            }

            class BiliEmoji extends HTMLElement {
                constructor() {
                    super();
                    this.attachShadow({ mode: 'open' });
                }

                connectedCallback() {
                    const emoji = this.getAttribute('data-emoji') || '[表情]';
                    const url = this.getAttribute('data-url') || '//i0.hdslb.com/bfs/emote/default.png';
                    this.shadowRoot.innerHTML = `
                        <style>
                            .emoji-img { width: 20px; height: 20px; vertical-align: middle; }
                        </style>
                        <img src="${url}" alt="${emoji}" class="emoji-img">
                    `;
                }
            }

            class BiliAvatar extends HTMLElement {
                constructor() {
                    super();
                    this.attachShadow({ mode: 'open' });
                }

                connectedCallback() {
                    const mid = this.getAttribute('data-mid') || '0';
                    this.shadowRoot.innerHTML = `
                        <style>
                            .avatar-img { width: 40px; height: 40px; border-radius: 50%; }
                        </style>
                        <img src="//i0.hdslb.com/bfs/face/member/noface.jpg" class="avatar-img" alt="用户头像">
                    `;
                }
            }

            // 注册Web Components
            if (!customElements.get('bili-comment-thread-renderer')) {
                customElements.define('bili-comment-thread-renderer', BiliCommentThreadRenderer);
            }
            if (!customElements.get('bili-comment-renderer')) {
                customElements.define('bili-comment-renderer', BiliCommentRenderer);
            }
            if (!customElements.get('bili-comment-reply-renderer')) {
                customElements.define('bili-comment-reply-renderer', BiliCommentRenderer);
            }
            if (!customElements.get('bili-rich-text')) {
                customElements.define('bili-rich-text', BiliRichText);
            }
            if (!customElements.get('bili-emoji')) {
                customElements.define('bili-emoji', BiliEmoji);
            }
            if (!customElements.get('bili-avatar')) {
                customElements.define('bili-avatar', BiliAvatar);
            }
        }

        // 其他初始化代码...
        console.log('Bilibili video page loaded with Shadow DOM components');

        // 模拟评论区动态加载
        setTimeout(() => {
            console.log('Comments loaded');
        }, 1000);
    </script>
</body>
</html>
