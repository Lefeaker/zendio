<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sanitized Doubao Current Session - 豆包</title>
  </head>
  <body>
    <aside class="semi-sidebar">
      <a class="history-item">Do not collect sidebar history</a>
    </aside>
    <header>
      <button class="model-selector-trigger">Doubao Pro</button>
    </header>
    <main data-testid="chat-area">
      <div class="semi-chat-message semi-chat-message-user" data-testid="message_user">
        <div class="semi-chat-message-content">
          <div class="send-text">Sanitized Doubao prompt about export coverage.</div>
        </div>
      </div>
      <div class="semi-chat-message semi-chat-message-assistant" data-testid="message_assistant">
        <img alt="豆包助手" src="" />
        <div class="semi-chat-message-content">
          <div class="flow-markdown-body">
            <p>Sanitized Doubao answer with retained markdown.</p>
            <table>
              <thead>
                <tr><th>Field</th><th>Value</th></tr>
              </thead>
              <tbody>
                <tr><td>coverage</td><td>current DOM</td></tr>
              </tbody>
            </table>
          </div>
          <div class="message-action-bar">
            <button type="button">复制</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
