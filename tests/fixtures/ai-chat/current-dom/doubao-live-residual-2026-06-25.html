<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sanitized Doubao Residual Session - 豆包</title>
  </head>
  <body>
    <aside data-history-container="true">
      <div class="chat-item-r3aVVV content-pWK1u_">Do not collect sidebar history</div>
    </aside>

    <main data-empty-conversation="false">
      <div
        class="chat-item-r3aVVV max-w-(--content-max-width) bg-g-send-msg-bubble-bg text-g-send-msg-bubble-text"
        data-container-type="message"
        data-message-id="sanitized-user-message-1"
        data-observe-row="true"
        data-render-engine="plain"
      >
        <div
          class="send-text !text-[length:var(--message-send-text-content-font-size,16px)]"
          data-render-engine="text"
        >
          Sanitized Doubao prompt about export coverage.
        </div>
      </div>

      <div
        class="chat-item-r3aVVV has-[.side-by-side-messages]:mx-0 has-[.side-by-side-messages]:max-w-full"
        data-container-type="message"
        data-message-id="sanitized-assistant-message-1"
        data-observe-row="true"
        data-render-engine="markdown"
        data-streaming="false"
        data-thinking-box="step-end-expanded"
      >
        <div
          class="[&amp;_[data-thinking-box=&quot;step-message&quot;]]:pl-0! [&amp;_[data-thinking-box=&quot;step-message&quot;]]:text-s-color-text-tertiary!"
          data-thinking-box="step-message"
        >
          Sanitized thinking box should not become exported answer content.
        </div>
        <div class="content-pWK1u_ text-dbx-text-primary" data-render-engine="markdown">
          <p>Sanitized Doubao answer with retained markdown after residual repair.</p>
          <table data-table-spillover="false">
            <thead>
              <tr><th>Field</th><th>Value</th></tr>
            </thead>
            <tbody>
              <tr><td>coverage</td><td>live residual DOM</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div
        class="suggest-message-oSXMsU send-text"
        data-container-type="suggestion"
        data-message-id="sanitized-suggestion-1"
        data-render-engine="text"
      >
        Do not collect suggestion chip text.
      </div>
    </main>
  </body>
</html>
