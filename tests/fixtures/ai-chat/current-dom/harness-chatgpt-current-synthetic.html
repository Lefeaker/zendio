<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Harness Current DOM - ChatGPT</title>
</head>
<body>
  <main data-testid="conversation-turns">
    <article data-testid="conversation-turn-1" data-message-author-role="user" class="user">
      <h5>You said:</h5>
      <div class="flex w-full flex-col gap-1">
        <div class="markdown prose">
          <p>Harness user asks for deterministic export.</p>
        </div>
        <div data-testid="message-toolbar">
          <button aria-label="Copy response"></button>
        </div>
      </div>
    </article>
    <article data-testid="conversation-turn-2" data-message-author-role="assistant">
      <h5>ChatGPT said:</h5>
      <div class="flex w-full flex-col gap-1">
        <div class="markdown prose">
          <p>Harness assistant response keeps sanitized current DOM shape.</p>
        </div>
        <div data-testid="message-toolbar">
          <button aria-label="Copy response"></button>
        </div>
      </div>
    </article>
  </main>
</body>
</html>
