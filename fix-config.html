<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>修复配置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 40px;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #252526;
      padding: 30px;
      border-radius: 8px;
      border: 1px solid #3e3e42;
    }
    h1 {
      color: #ffffff;
      margin-bottom: 20px;
    }
    button {
      padding: 12px 24px;
      background: #0e639c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      margin: 10px 10px 10px 0;
    }
    button:hover {
      background: #1177bb;
    }
    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 14px;
    }
    .success {
      background: #1e3a1e;
      border: 1px solid #28a745;
      color: #4ec9b0;
    }
    .error {
      background: #3a1e1e;
      border: 1px solid #dc3545;
      color: #f48771;
    }
    .info {
      background: #1e2a3a;
      border: 1px solid #0e639c;
      color: #9cdcfe;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 修复配置 - 添加 Fragment 模板</h1>
    <p>这个工具会在你的配置中添加缺失的 <code>fragment</code> 模板字段。</p>
    
    <button onclick="fixConfig()">修复配置</button>
    <button onclick="showConfig()">查看当前配置</button>
    
    <div id="result"></div>
  </div>

  <script>
    async function fixConfig() {
      try {
        // 读取当前配置
        const { options } = await chrome.storage.sync.get('options');
        
        if (!options) {
          showResult('❌ 未找到配置', 'error');
          return;
        }

        // 检查是否已有 fragment 字段
        if (options.templates && options.templates.fragment) {
          showResult('✅ 配置中已经有 fragment 字段:\n' + options.templates.fragment, 'info');
          return;
        }

        // 添加 fragment 字段
        if (!options.templates) {
          options.templates = {};
        }

        options.templates.fragment = 'Fragments/{yyyy}/{mm}/{dd}/{title}.md';

        // 保存配置
        await chrome.storage.sync.set({ options });

        showResult(
          '✅ 配置已修复！\n\n' +
          '添加的字段:\n' +
          'templates.fragment = "Fragments/{yyyy}/{mm}/{dd}/{title}.md"\n\n' +
          '请刷新设置页面查看更新后的配置。',
          'success'
        );
      } catch (error) {
        showResult('❌ 修复失败: ' + error.message, 'error');
      }
    }

    async function showConfig() {
      try {
        const { options } = await chrome.storage.sync.get('options');
        
        if (!options) {
          showResult('❌ 未找到配置', 'error');
          return;
        }

        showResult(
          '📋 当前配置:\n\n' +
          JSON.stringify(options, null, 2),
          'info'
        );
      } catch (error) {
        showResult('❌ 读取失败: ' + error.message, 'error');
      }
    }

    function showResult(message, type) {
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = message;
      resultDiv.className = `result ${type}`;
    }
  </script>
</body>
</html>
