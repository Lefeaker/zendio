<!doctype html>
<html
  lang="zh-CN"
  class="aobx-preview"
  data-preview-skin="stitch-secondary"
  data-preview-theme="dark"
>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runtime Observability Harness</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./options/stitch/styles/stitch.css" />
    <link rel="stylesheet" href="./options/stitch/styles/variants/stitch-secondary.css" />
    <style>
      .harness-body {
        margin: 0;
        min-height: 100vh;
        background: var(--background);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .harness-main {
        width: min(1120px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 32px 0;
        display: grid;
        gap: 24px;
      }

      .harness-controls,
      .harness-requests {
        display: grid;
        gap: 12px;
      }

      .harness-status {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px 16px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.04);
      }
    </style>
  </head>
  <body class="harness-body">
    <main class="harness-main">
      <section class="card">
        <div class="card-header">
          <h1>Runtime Observability Harness</h1>
          <p>
            Validate consent, debug mode, global error boundary, GA4 debug endpoint, and Sentry
            envelope reporting in a real browser.
          </p>
        </div>
        <div id="controls" class="harness-controls"></div>
        <div id="status" class="harness-status">Booting harness...</div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Captured Requests</h2>
        </div>
        <div id="requests" class="harness-requests"></div>
      </section>
    </main>
    <script type="module" src="./runtime-observability-harness.js"></script>
  </body>
</html>
