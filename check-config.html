<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检查扩展配置</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .config {
            background: #252526;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        pre {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px 5px;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background: #1177bb;
        }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .warning { color: #dcdcaa; }
    </style>
</head>
<body>
    <h1>🔍 检查扩展配置</h1>
    
    <div class="config">
        <h2>当前配置</h2>
        <pre id="config">加载中...</pre>
    </div>

    <div class="config">
        <h2>操作</h2>
        <button onclick="loadConfig()">刷新配置</button>
        <button onclick="fixConfig()">修复配置</button>
        <button onclick="clearConfig()">清除配置</button>
    </div>

    <div class="config">
        <h2>日志</h2>
        <pre id="log"></pre>
    </div>

    <script>
        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'success' ? '#4ec9b0' : type === 'error' ? '#f48771' : '#dcdcaa';
            logEl.innerHTML += `<span style="color: ${color}">[${timestamp}] ${message}</span>\n`;
        }

        async function loadConfig() {
            try {
                const { options } = await chrome.storage.sync.get('options');
                document.getElementById('config').textContent = JSON.stringify(options, null, 2);
                log('✅ 配置加载成功', 'success');
                
                // 检查配置
                if (!options) {
                    log('⚠️ 未找到配置，使用默认值', 'warning');
                } else {
                    if (options.rest?.httpsUrl) {
                        log(`✅ HTTPS URL: ${options.rest.httpsUrl}`, 'success');
                    } else {
                        log('⚠️ 未配置 HTTPS URL', 'warning');
                    }
                    
                    if (options.rest?.httpUrl) {
                        log(`✅ HTTP URL: ${options.rest.httpUrl}`, 'success');
                    } else {
                        log('⚠️ 未配置 HTTP URL', 'warning');
                    }
                    
                    if (options.rest?.baseUrl) {
                        log(`ℹ️ Base URL (向后兼容): ${options.rest.baseUrl}`, 'info');
                    }
                }
            } catch (error) {
                log(`❌ 加载配置失败: ${error.message}`, 'error');
            }
        }

        async function fixConfig() {
            try {
                const { options } = await chrome.storage.sync.get('options');
                
                if (!options || !options.rest) {
                    log('❌ 未找到配置，无法修复', 'error');
                    return;
                }

                // 修复配置
                const newOptions = {
                    ...options,
                    rest: {
                        ...options.rest,
                        httpsUrl: options.rest.httpsUrl || 'https://127.0.0.1:27124/',
                        httpUrl: options.rest.httpUrl || 'http://127.0.0.1:27123/',
                        baseUrl: options.rest.httpsUrl || options.rest.baseUrl || 'https://127.0.0.1:27124/'
                    }
                };

                await chrome.storage.sync.set({ options: newOptions });
                log('✅ 配置已修复', 'success');
                log('请刷新配置查看结果', 'info');
                
                setTimeout(loadConfig, 500);
            } catch (error) {
                log(`❌ 修复配置失败: ${error.message}`, 'error');
            }
        }

        async function clearConfig() {
            if (!confirm('确定要清除所有配置吗？这将重置为默认值。')) {
                return;
            }

            try {
                await chrome.storage.sync.remove('options');
                log('✅ 配置已清除', 'success');
                log('请重新打开选项页面进行配置', 'info');
                
                setTimeout(loadConfig, 500);
            } catch (error) {
                log(`❌ 清除配置失败: ${error.message}`, 'error');
            }
        }

        // 页面加载时自动加载配置
        window.onload = loadConfig;
    </script>
</body>
</html>
