<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名映射功能测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #4ec9b0;
            border-bottom: 2px solid #3e3e42;
            padding-bottom: 10px;
        }
        .test-section {
            background: #252526;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #3e3e42;
        }
        .test-case {
            background: #1e1e1e;
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            border-left: 3px solid #0e639c;
        }
        .test-case h3 {
            margin-top: 0;
            color: #569cd6;
        }
        .input {
            color: #ce9178;
            font-family: 'Courier New', monospace;
        }
        .output {
            color: #4ec9b0;
            font-family: 'Courier New', monospace;
        }
        .expected {
            color: #b5cea8;
            font-family: 'Courier New', monospace;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background: rgba(78, 201, 176, 0.2);
            border-left: 3px solid #4ec9b0;
        }
        .error {
            background: rgba(244, 135, 113, 0.2);
            border-left: 3px solid #f48771;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover {
            background: #1177bb;
        }
        code {
            background: #1e1e1e;
            padding: 2px 6px;
            border-radius: 3px;
            color: #ce9178;
        }
    </style>
</head>
<body>
    <h1>🧪 域名映射功能测试</h1>
    
    <div class="test-section">
        <h2>测试说明</h2>
        <p>这个页面用于测试域名映射功能是否正常工作。</p>
        <p>测试将模拟不同的域名和模板配置，验证映射是否正确应用。</p>
        <button onclick="runAllTests()">🚀 运行所有测试</button>
    </div>

    <div id="test-results"></div>

    <script>
        // 模拟 pathResolver 函数
        function resolvePath(tplCfg, payload, cls, domainMappings) {
            const d = new Date();
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const safe = (s) => s?.replace(/[\\/:*?"<>|]/g, '_').slice(0, 180) || 'note';
            const slug = (s) => safe(s).toLowerCase().replace(/\s+/g, '-');

            const title = payload.title || 'Untitled';

            if (payload.type === 'ai_chat') {
                const tpl = tplCfg?.ai || 'AI/{platform}/{yyyy}/{yyyy}-{mm}-{dd}_{title}.md';
                return tpl
                    .replace('{platform}', payload.meta?.platform || cls.ai_platform || 'chat')
                    .replace('{yyyy}', String(yyyy))
                    .replace('{mm}', mm)
                    .replace('{dd}', dd)
                    .replace('{title}', safe(title));
            } else {
                const tpl = tplCfg?.article || 'Clippings/{domain}/{yyyy}/{slug}.md';
                let domain = payload.meta?.domain || (payload.meta?.url ? new URL(payload.meta.url).hostname : 'unknown');
                
                // 应用域名映射
                if (domainMappings && domainMappings[domain]) {
                    domain = domainMappings[domain];
                }
                
                return tpl
                    .replace('{domain}', safe(domain))
                    .replace('{yyyy}', String(yyyy))
                    .replace('{slug}', slug(title));
            }
        }

        // 测试用例
        const testCases = [
            {
                name: '微信公众号映射',
                template: { article: 'Clippings/{domain}/{yyyy}/{slug}.md' },
                payload: {
                    type: 'article',
                    title: '这是一篇公众号文章',
                    meta: { url: 'https://mp.weixin.qq.com/s/abc123' }
                },
                mappings: { 'mp.weixin.qq.com': '公众号' },
                expectedPattern: /Clippings\/公众号\/\d{4}\/.+\.md/
            },
            {
                name: '知识星球映射',
                template: { article: 'Clippings/{domain}/{yyyy}/{slug}.md' },
                payload: {
                    type: 'article',
                    title: '知识星球讨论',
                    meta: { url: 'https://wx.zsxq.com/topic/123' }
                },
                mappings: { 'wx.zsxq.com': '知识星球' },
                expectedPattern: /Clippings\/知识星球\/\d{4}\/.+\.md/
            },
            {
                name: '知乎映射',
                template: { article: 'Clippings/{domain}/{yyyy}/{slug}.md' },
                payload: {
                    type: 'article',
                    title: '知乎问答',
                    meta: { url: 'https://www.zhihu.com/question/123' }
                },
                mappings: { 'www.zhihu.com': '知乎' },
                expectedPattern: /Clippings\/知乎\/\d{4}\/.+\.md/
            },
            {
                name: '无映射的域名',
                template: { article: 'Clippings/{domain}/{yyyy}/{slug}.md' },
                payload: {
                    type: 'article',
                    title: 'Example Article',
                    meta: { url: 'https://example.com/article' }
                },
                mappings: { 'mp.weixin.qq.com': '公众号' },
                expectedPattern: /Clippings\/example\.com\/\d{4}\/.+\.md/
            },
            {
                name: '自定义映射',
                template: { article: 'Notes/{domain}/{slug}.md' },
                payload: {
                    type: 'article',
                    title: 'My Blog Post',
                    meta: { url: 'https://blog.example.com/post' }
                },
                mappings: { 'blog.example.com': '我的博客' },
                expectedPattern: /Notes\/我的博客\/.+\.md/
            },
            {
                name: '复杂路径模板',
                template: { article: 'Archive/{yyyy}/{mm}/{domain}/{slug}.md' },
                payload: {
                    type: 'article',
                    title: '掘金技术文章',
                    meta: { url: 'https://juejin.cn/post/123' }
                },
                mappings: { 'juejin.cn': '掘金' },
                expectedPattern: /Archive\/\d{4}\/\d{2}\/掘金\/.+\.md/
            },
            {
                name: 'AI 对话（不使用域名映射）',
                template: { ai: 'AI/{platform}/{yyyy}/{yyyy}-{mm}-{dd}_{title}.md' },
                payload: {
                    type: 'ai_chat',
                    title: 'ChatGPT Conversation',
                    meta: { platform: 'chatgpt' }
                },
                mappings: { 'mp.weixin.qq.com': '公众号' },
                expectedPattern: /AI\/chatgpt\/\d{4}\/\d{4}-\d{2}-\d{2}_.+\.md/
            }
        ];

        function runTest(testCase) {
            const result = resolvePath(
                testCase.template,
                testCase.payload,
                {},
                testCase.mappings
            );

            const passed = testCase.expectedPattern.test(result);

            return {
                name: testCase.name,
                passed,
                result,
                expected: testCase.expectedPattern.toString(),
                input: {
                    url: testCase.payload.meta?.url || 'N/A',
                    title: testCase.payload.title,
                    template: testCase.template.article || testCase.template.ai,
                    mappings: JSON.stringify(testCase.mappings, null, 2)
                }
            };
        }

        function runAllTests() {
            const resultsContainer = document.getElementById('test-results');
            resultsContainer.innerHTML = '';

            let passedCount = 0;
            let failedCount = 0;

            testCases.forEach((testCase, index) => {
                const testResult = runTest(testCase);
                
                if (testResult.passed) {
                    passedCount++;
                } else {
                    failedCount++;
                }

                const testDiv = document.createElement('div');
                testDiv.className = 'test-section';
                testDiv.innerHTML = `
                    <div class="test-case">
                        <h3>测试 ${index + 1}: ${testResult.name}</h3>
                        <p><strong>输入 URL:</strong> <span class="input">${testResult.input.url}</span></p>
                        <p><strong>标题:</strong> <span class="input">${testResult.input.title}</span></p>
                        <p><strong>模板:</strong> <code>${testResult.input.template}</code></p>
                        <p><strong>映射:</strong></p>
                        <pre class="input">${testResult.input.mappings}</pre>
                        <p><strong>实际输出:</strong> <span class="output">${testResult.result}</span></p>
                        <p><strong>期望模式:</strong> <span class="expected">${testResult.expected}</span></p>
                        <div class="result ${testResult.passed ? 'success' : 'error'}">
                            ${testResult.passed ? '✅ 测试通过' : '❌ 测试失败'}
                        </div>
                    </div>
                `;
                resultsContainer.appendChild(testDiv);
            });

            // 添加总结
            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'test-section';
            summaryDiv.innerHTML = `
                <h2>测试总结</h2>
                <p>总计: ${testCases.length} 个测试</p>
                <p style="color: #4ec9b0;">✅ 通过: ${passedCount}</p>
                <p style="color: #f48771;">❌ 失败: ${failedCount}</p>
                <div class="result ${failedCount === 0 ? 'success' : 'error'}">
                    ${failedCount === 0 ? '🎉 所有测试通过！' : '⚠️ 部分测试失败，请检查'}
                </div>
            `;
            resultsContainer.insertBefore(summaryDiv, resultsContainer.firstChild);
        }

        // 页面加载时显示说明
        window.onload = function() {
            console.log('域名映射测试页面已加载');
            console.log('点击"运行所有测试"按钮开始测试');
        };
    </script>
</body>
</html>
