name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  static-preflight:
    name: Static preflight
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Verify CI workflow topology
        run: npm run audit:ci-workflow:check

      - name: Verify generated i18n catalog artifacts are up to date
        run: npm run i18n:catalog:check

      - name: Verify preflight baseline
        run: npm run verify:preflight

  static-release-surface:
    name: Static release surface
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Audit release surface
        run: |
          npm run build:fast
          npm run audit:release-surface:report

  static-generated-artifacts:
    name: Static generated artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Verify generated Chrome locales are up to date
        run: |
          npm run i18n:generate
          git diff --exit-code -- public/_locales

      - name: Verify generated browser manifests are up to date
        run: |
          npm run manifest:generate
          git diff --exit-code -- public/manifest.json public/manifest.firefox.json

  static-style-and-locale:
    name: Static style and locale audits
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Locale source alignment audit report
        run: npm run audit:locales:report

      - name: Audit Options CSS naming
        run: |
          npm run report:options-legacy
          npm run lint:options-css

      - name: Enforce hardcoded config guard
        run: npm run lint:hardcoded

      - name: Enforce lint warning guard
        run: npm run lint:warnings-guard

  static-reporting-audits:
    name: Static reporting audits
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Dependency boundary audit report
        continue-on-error: true
        run: npm run audit:deps:report

      - name: Platform services allowlist audit report
        continue-on-error: true
        run: npm run audit:platform-services:report

      - name: Design token alignment audit report
        continue-on-error: true
        run: npm run audit:design-tokens:report

  coverage:
    name: Unit coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Run unit tests with coverage thresholds
        run: npm run test:coverage

      - name: Print coverage summary
        run: |
          node -e "const fs=require('fs');const s=JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8')).total;console.log('Lines:',s.lines.pct+'%');console.log('Statements:',s.statements.pct+'%');console.log('Functions:',s.functions.pct+'%');console.log('Branches:',s.branches.pct+'%');"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            coverage/coverage-summary.json
            coverage/lcov.info
          if-no-files-found: error

      - name: Comment PR with coverage summary
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')).total;
            const body = [
              '## Coverage Summary',
              '',
              `- Lines: ${summary.lines.pct}%`,
              `- Statements: ${summary.statements.pct}%`,
              `- Functions: ${summary.functions.pct}%`,
              `- Branches: ${summary.branches.pct}%`
            ].join('\n');
            const marker = '<!-- zendio-coverage-summary -->';
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            const fullBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: fullBody
              });
            }

  visual:
    name: Visual regression (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium-desktop
          - chromium-tablet
          - chromium-mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Run i18n visual regression tests
        run: npm run verify:runtime && node scripts/run-playwright.mjs test --config=playwright.config.ts --project=${{ matrix.project }}

      - name: Upload visual reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-reports-${{ matrix.project }}
          path: |
            build/reports/
            tests/visual/__output__/
          if-no-files-found: ignore

  e2e-vitest:
    name: E2E Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Run Vitest end-to-end tests
        run: npm run test:e2e

  browser-yaml:
    name: Browser YAML flow
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Run browser YAML tests
        run: npm run test:e2e:browser

      - name: Upload browser YAML reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-yaml-reports
          path: |
            build/reports/
            tests/visual/__output__/
            build/reports/playwright/
          if-no-files-found: ignore

  browser-reader-panel:
    name: Browser reader panel flow
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Run browser reader panel tests
        run: npm run test:e2e:browser:reader-panel

      - name: Upload browser reader panel reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-reader-panel-reports
          path: |
            build/reports/
            tests/visual/__output__/
            build/reports/playwright/
          if-no-files-found: ignore

  browser-smoke:
    name: Browser smoke flow
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Run browser smoke tests
        run: npm run test:e2e:browser:smoke

      - name: Upload browser smoke reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-smoke-reports
          path: |
            build/reports/
            tests/visual/__output__/
            build/reports/playwright/
          if-no-files-found: ignore

  package:
    name: Package extension
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [static-preflight]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Build production bundle
        run: npm run build:fast

      - name: Validate text budgets
        run: npm run validate:i18n:budgets

      - name: Inspect layout across locales
        run: npm run layout:report

      - name: Generate layout summary
        run: npm run report:layout

      - name: Generate release summary
        run: npm run report:release-summary

      - name: Upload release summary
        uses: actions/upload-artifact@v7
        with:
          name: release-summary
          path: |
            build/reports/release-summary.md
            build/reports/release-summary.json
          if-no-files-found: error

      - name: Package extension artifacts
        run: npm run package:ci
