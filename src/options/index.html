<!doctype html>
<html lang="zh-CN" class="aobx-preview">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All in Ob – 设置</title>
  <link rel="stylesheet" href="./styles/design-tokens.css">
  <link rel="stylesheet" href="../styles/global.tailwind.css">
  <link rel="stylesheet" href="./styles/tailwind.css">

</head>

<body class="aobx-preview m-0 min-h-screen bg-surface text-text font-ui text-md leading-[1.56]">
  <!-- ✅ Phase 3: 主题切换器容器 -->
  <div id="theme-switcher" class="fixed top-4 right-4 z-50 bg-base-100 border border-base-300 rounded-lg shadow-lg p-3"></div>

  <div id="optionsShellRoot"></div>

  <div id="supportModal"
    class="aobx-modal fixed inset-0 z-[1200] hidden items-center justify-center p-6 bg-black/55 backdrop-blur-sm"
    aria-hidden="true">
    <div
      class="aobx-modal__dialog bg-surface-1 border border-border/85 rounded-2xl shadow-card w-[min(480px,calc(100vw-48px))] max-h-[min(85vh,720px)] flex flex-col gap-4 overflow-hidden relative p-6"
      role="dialog" aria-modal="true" aria-labelledby="supportModalTitle">
      <div class="aobx-modal__header flex flex-col items-center justify-center gap-2 text-center">
        <h3 id="supportModalTitle" class="aobx-modal__title m-0 text-text text-lg font-semibold text-center w-full"
          data-i18n="supportModalTitle">感谢支持</h3>
      </div>
      <div class="aobx-modal__body flex-1 flex flex-col gap-4 overflow-y-auto">
        <p class="aobx-modal__description m-0 text-text-muted leading-relaxed text-sm"
          data-i18n="supportModalDescription">开发不易，如果这个插件对您有帮助，欢迎通过以下方式支持：</p>
        <div class="support-modal__grid grid gap-3 grid-cols-[repeat(auto-fit,minmax(200px,1fr))]">
          <a href="https://ko-fi.com/xiannian" target="_blank" rel="noopener noreferrer"
            class="support-modal__card grid gap-1 p-4 rounded-lg border border-border/85 bg-[linear-gradient(120deg,color-mix(in_srgb,var(--aobx-accent)_5%,transparent),transparent),var(--aobx-surface-0)] text-text no-underline transition-colors hover:border-border/60">
            <span class="support-modal__icon text-2xl" data-icon="ko-fi"></span>
            <div class="support-modal__meta">
              <span class="support-modal__label text-sm text-text-muted tracking-wide"
                data-i18n="supportLinkKofi">Ko-fi</span>
            </div>
            <span class="support-modal__arrow text-text-muted" aria-hidden="true">→</span>
          </a>
          <a href="https://afdian.com/a/LefShi" target="_blank" rel="noopener noreferrer"
            class="support-modal__card grid gap-1 p-4 rounded-lg border border-border/85 bg-[linear-gradient(120deg,color-mix(in_srgb,var(--aobx-accent)_5%,transparent),transparent),var(--aobx-surface-0)] text-text no-underline transition-colors hover:border-border/60">
            <span class="support-modal__icon text-2xl" data-icon="afdian"></span>
            <div class="support-modal__meta">
              <span class="support-modal__label text-sm text-text-muted tracking-wide"
                data-i18n="supportLinkAfdian">爱发电</span>
            </div>
            <span class="support-modal__arrow text-text-muted" aria-hidden="true">→</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div id="suggestionsModal"
    class="aobx-modal fixed inset-0 z-[1200] hidden items-center justify-center p-6 bg-black/55 backdrop-blur-sm"
    aria-hidden="true">
    <div
      class="aobx-modal__dialog bg-surface-1 border border-border/85 rounded-2xl shadow-card w-[min(640px,calc(100vw-48px))] max-h-[min(85vh,720px)] flex flex-col gap-4 overflow-hidden relative p-6"
      role="dialog" aria-modal="true" aria-labelledby="suggestionsModalTitle">
      <div class="aobx-modal__header flex flex-col items-center justify-center gap-2 text-center">
        <h3 id="suggestionsModalTitle" class="aobx-modal__title m-0 text-text text-lg font-semibold text-center w-full"
          data-role="suggestions-title">提出建议</h3>
      </div>
      <div class="aobx-modal__body suggestions-modal__body flex-1 flex flex-col gap-4 overflow-y-auto">
        <p class="aobx-modal__description m-0 text-text-muted leading-relaxed text-sm"
          data-role="suggestions-description">感谢你愿意反馈想法，以下渠道都可以快速联系到作者：</p>
        <div class="suggestions-modal__grid grid gap-3 grid-cols-[repeat(auto-fit,minmax(200px,1fr))]">
          <a class="support-modal__card suggestions-modal__card grid gap-1 p-4 rounded-lg border border-border/85 bg-[linear-gradient(120deg,color-mix(in_srgb,var(--aobx-accent)_5%,transparent),transparent),var(--aobx-surface-0)] text-text no-underline transition-colors hover:border-border/60"
            href="https://www.reddit.com/user/sxnian/" target="_blank" rel="noopener noreferrer">
            <span class="suggestions-modal__icon text-2xl" data-icon="reddit"></span>
            <span class="suggestions-modal__label text-sm text-text-muted tracking-wide"
              data-role="suggestions-reddit">Reddit 社区</span>
            <span class="suggestions-modal__arrow text-text-muted" aria-hidden="true">→</span>
          </a>
          <button type="button"
            class="support-modal__card suggestions-modal__card suggestions-modal__card--button grid gap-1 p-4 rounded-lg border border-border/85 bg-[linear-gradient(120deg,color-mix(in_srgb,var(--aobx-accent)_5%,transparent),transparent),var(--aobx-surface-0)] text-text no-underline transition-colors hover:border-border/60 w-full text-left cursor-pointer"
            id="suggestionsXhsTrigger">
            <span class="suggestions-modal__icon text-2xl" data-icon="xiaohongshu"></span>
            <span class="suggestions-modal__label text-sm text-text-muted tracking-wide"
              data-role="suggestions-xhs">小红书交流</span>
            <span class="suggestions-modal__arrow text-text-muted" aria-hidden="true">→</span>
          </button>
          <a class="support-modal__card suggestions-modal__card grid gap-1 p-4 rounded-lg border border-border/85 bg-[linear-gradient(120deg,color-mix(in_srgb,var(--aobx-accent)_5%,transparent),transparent),var(--aobx-surface-0)] text-text no-underline transition-colors hover:border-border/60"
            href="https://github.com/Lefeaker/AllinOB/issues/new?labels=enhancement&amp;title=%5B建议%5D%20"
            target="_blank" rel="noopener noreferrer">
            <span class="suggestions-modal__icon text-2xl" data-icon="github"></span>
            <span class="suggestions-modal__label text-sm text-text-muted tracking-wide"
              data-role="suggestions-github">GitHub Issue</span>
            <span class="suggestions-modal__arrow text-text-muted" aria-hidden="true">→</span>
          </a>
        </div>
        <div id="suggestionsXhsQr"
          class="suggestions-modal__qr mt-4 flex justify-center p-4 bg-surface-0 rounded-lg border border-border/50"
          hidden>
          <div class="suggestions-modal__qr-content text-center">
            <p data-role="suggestions-qr-placeholder" class="text-sm text-text-muted">二维码稍后提供，欢迎暂时通过 Reddit 联系作者。</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="contactModal"
    class="aobx-modal fixed inset-0 z-[1200] hidden items-center justify-center p-6 bg-black/55 backdrop-blur-sm"
    aria-hidden="true">
    <div
      class="aobx-modal__dialog bg-surface-1 border border-border/85 rounded-2xl shadow-card w-[min(480px,calc(100vw-48px))] max-h-[min(85vh,720px)] flex flex-col gap-4 overflow-hidden relative p-6"
      role="dialog" aria-modal="true" aria-labelledby="contactModalTitle">
      <div class="aobx-modal__header flex flex-col items-center justify-center gap-2 text-center">
        <h3 id="contactModalTitle" class="aobx-modal__title m-0 text-text text-lg font-semibold text-center w-full"
          data-i18n="contactModalTitle">联系作者</h3>
      </div>
      <div class="aobx-modal__body contact-modal__body flex-1 flex flex-col gap-4 overflow-y-auto">
        <p class="aobx-modal__description m-0 text-text-muted leading-relaxed text-sm"
          data-i18n-html="contactModalDescription">
          如果你认可该产品，或想要与作者交流，欢迎 <a href="https://www.reddit.com/user/sxnian/" target="_blank" rel="noopener noreferrer"
            class="text-accent hover:text-accent-hover no-underline">reddit</a> 交流，或添加微信：Lefeaker，请注明来处，作者正在求职（秋招人拼了）
        </p>
      </div>
    </div>
  </div>

  <div id="changelogModal"
    class="aobx-modal fixed inset-0 z-[1200] hidden items-center justify-center p-6 bg-black/55 backdrop-blur-sm"
    aria-hidden="true">
    <div
      class="aobx-modal__dialog bg-surface-1 border border-border/85 rounded-2xl shadow-card w-[min(640px,calc(100vw-48px))] max-h-[min(85vh,720px)] flex flex-col gap-4 overflow-hidden relative p-6"
      role="dialog" aria-modal="true" aria-labelledby="changelogModalTitle">
      <div class="aobx-modal__header flex flex-col items-center justify-center gap-2 text-center relative">
        <h3 id="changelogModalTitle" class="aobx-modal__title m-0 text-text text-lg font-semibold text-center w-full"
          data-i18n="changelogModalTitle">更新日志</h3>
        <button
          class="aobx-modal__close absolute right-0 top-0 w-9 h-9 border-none rounded-full bg-transparent text-text-muted text-[22px] leading-none cursor-pointer flex items-center justify-center transition-colors hover:bg-accent/12 hover:text-text focus-visible:outline-none"
          data-modal-close aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="aobx-modal__body flex-1 flex flex-col gap-4 overflow-y-auto">
        <div class="changelog-content prose prose-sm max-w-none text-text" id="changelogContent">
          <!-- 更新日志内容将通过 JavaScript 动态加载 -->
        </div>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>

</html>
